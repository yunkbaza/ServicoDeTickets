services:
  mongodb:
    image: mongo:latest
    container_name: bazaticket_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - bazaticket_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bazaticket_rabbitmq
    ports:
      - "5672:5672" # Porta da aplicação (onde o C# escuta)
      - "15672:15672" # Painel administrativo visual
    networks:
      - bazaticket_network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: bazaticket_jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - bazaticket_network

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: bazaticket_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - rabbitmq # O n8n só sobe depois do RabbitMQ
    networks:
      - bazaticket_network

volumes:
  mongodb_data:
  n8n_data: 

networks:
  bazaticket_network:
    driver: bridge
